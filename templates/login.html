<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MR Digital – Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0f17;
            --surface: #161926;
            --border: #252840;
            --accent: #6366f1;
            --accent-hover: #4f52d6;
            --text: #e8eaf6;
            --text-muted: #7b7fa8;
            --error-bg: rgba(239, 68, 68, 0.12);
            --error-border: rgba(239, 68, 68, 0.4);
            --error-text: #f87171;
            --input-bg: #1e2235;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Background glow effects */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -20%;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 1;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            animation: fadeUp 0.4s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 32px;
        }

        .logo-mark {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            color: #fff;
            flex-shrink: 0;
        }

        .logo-info {
            display: flex;
            flex-direction: column;
        }

        .logo-brand {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }

        .logo-sub {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text);
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        .error-box {
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--error-text);
            font-size: 13px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            pointer-events: none;
        }

        input[type="password"] {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px 12px 42px;
            color: var(--text);
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        input[type="password"]::placeholder {
            color: var(--text-muted);
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            margin-top: 4px;
        }

        .btn-login:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .footer-note {
            text-align: center;
            margin-top: 28px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .lock-icon {
            font-size: 40px;
            text-align: center;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo-row">
            <div class="logo-mark">M</div>
            <div class="logo-info">
                <span class="logo-brand">MR Digital</span>
                <span class="logo-sub">Akquise Automatisierung v2</span>
            </div>
        </div>

        <div class="lock-icon">🔐</div>
        <h1>Willkommen zurück</h1>
        <p class="subtitle">Bitte Passwort eingeben um fortzufahren</p>

        {% if error %}
        <div class="error-box">
            <span>⚠️</span>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="password">Passwort</label>
                <div class="input-wrap">
                    <span class="input-icon">🔑</span>
                    <input type="password" id="password" name="password" placeholder="Passwort eingeben..." autofocus
                        autocomplete="current-password" />
                </div>
            </div>
            <button type="submit" class="btn-login">🚀 Einloggen</button>
        </form>

        <p class="footer-note">MR DigitalServices · Geschützter Bereich</p>
    </div>
</body>

</html>
