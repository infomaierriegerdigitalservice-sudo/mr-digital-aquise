version: '3.8'

services:
  akquise-app:
    build: .
    container_name: mr-digital-akquise
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PORT=5000
      - SECRET_KEY=mr-digital-akquise-live-key
      # - GMAIL_ADDRESS=...
      # - GMAIL_APP_PASSWORD=...
    volumes:
      - ./data:/app/data
